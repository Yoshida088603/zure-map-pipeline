<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>地籍ライブラリ データプレビュー（β版）</title>
    <meta
      name="description"
      content="serve.py で配信。mode 省略＝軽量（overview＋単系）。?mode=standard で全データ。?mode=all-kei で全系詳細。?mode=overview は overview のみ。ズーム8で overview⇔詳細。"
    />
    <link href="style.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.3.2/dist/maplibre-gl.js"></script>

  <body>
    <nav class="map-mode-bar" aria-label="表示モード">
      <div class="map-app-title">地籍ライブラリ データプレビュー（β版）</div>
      <a href="index.html">軽量プレビュー（既定）</a>
      <span aria-hidden="true">|</span>
      <a href="index.html?mode=standard">全データプレビュー</a>
      <span aria-hidden="true">|</span>

      </div>
    </nav>
    <div id="map"></div>
    <div id="z12-kei-hud" class="z12-kei-hud z12-kei-only"></div>
    <pre id="z12-kei-console" class="z12-kei-console z12-kei-only" aria-label="診断ログ"></pre>

    <script src="main.js?v=20260329-lowload"></script>
